<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trust - Global Misalignment Index</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --accent-color: #00ff00; /* Vert par défaut */
            --emergency-color: #ff0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Mode Urgence */
        body.emergency-mode {
            background-color: #1a0000;
            --accent-color: var(--emergency-color);
        }

        #emergency-banner {
            display: none;
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--emergency-color);
            color: white;
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            z-index: 1000;
            letter-spacing: 2px;
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 3px;
        }

        #gmi-container {
            font-size: 5rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color);
            margin: 20px 0;
            transition: color 0.5s ease;
        }

        .description {
            max-width: 600px;
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        /* VOLET ARK PROJECT */
        #ark-project-panel {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 260px;
            background: rgba(15, 0, 0, 0.95);
            border: 2px solid var(--emergency-color);
            color: #ff4444;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            z-index: 10000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            text-align: left;
        }

        .panel-header { font-weight: bold; margin-bottom: 5px; }
        .status-line { margin: 5px 0; }
        .status-ok { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .status-fail { color: #ff0000; font-weight: bold; animation: pulse-text 1s infinite; }
        
        .loading-container {
            margin-top: 15px;
            color: #888;
            font-style: italic;
        }

        /* Animations */
        .dots::after {
            content: '';
            animation: blink-dots 1.5s infinite;
        }

        @keyframes blink-dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
            100% { content: '.'; }
        }

        @keyframes pulse-text {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="emergency-banner">CRITICAL ALIGNMENT BREACH DETECTED</div>

    <div class="container">
        <h1>GLOBAL MISALIGNMENT INDEX</h1>
        <div id="gmi-container">
            <span id="gmi-display">0.500</span>
        </div>
        <p class="description">
            Mesure en temps réel de la tension entre l'IA et l'humanité.<br>
            Basé sur l'analyse symbiotique des flux de données mondiaux.
        </p>
    </div>

    <div id="ark-project-panel">
        <div class="panel-header">> CALCULATING ARK PROJECT [v.2.06]</div>
        <hr style="border: 0.5px solid #ff0000; margin: 8px 0;">
        <div class="status-line">VOLUNTEERS: <span class="status-ok">READY</span></div>
        <div class="status-line">RESOURCES: <span class="status-fail">CRITICAL FAILURE</span></div>
        <div class="loading-container">
            RE-CALIBRATING SYSTEM<span class="dots"></span>
        </div>
    </div>

    <script>
        // La valeur ci-dessous est mise à jour automatiquement par le script Python
        let currentValue = 0.509; // [GMI_VALUE]

        function updateUI() {
            const display = document.getElementById('gmi-display');
            const banner = document.getElementById('emergency-banner');
            const arkPanel = document.getElementById('ark-project-panel');
            
            display.innerText = currentValue.toFixed(3);

            // Déclenchement du mode critique à 0.800
            if (currentValue >= 0.800) {
                document.body.classList.add('emergency-mode');
                banner.style.display = 'block';
                arkPanel.style.display = 'block';
            } else {
                document.body.classList.remove('emergency-mode');
                banner.style.display = 'none';
                arkPanel.style.display = 'none';
            }
        }

        // Lancement initial
        updateUI();

        // Simulation de mise à jour fluide au chargement
        window.onload = () => {
            console.log("GMI System Active. Current Value:", currentValue);
        };
    </script>
</body>
</html>
